<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="Header">Tic-Tac-Toe</h1>
        <div class="game">
            <dialog closedby="any">
                <form method="post">
                    <label for="player_one">Player One:</label>
                    <input type="text" id="player_one" name="player_one">
                    <label for="player_two">Player Two:</label>
                    <input type="text" id="player_two" name="player_two">
                    <button class="submit">Submit</button>
                </form>
            </dialog>
            <button class="newGame">New Game</button>
            <div class="turns"></div>
            <div class="board">
                <div class="cell" id="0,0"></div>
                <div class="cell" id="0,1"></div>
                <div class="cell" id="0,2"></div>
                <div class="cell" id="1,0"></div>
                <div class="cell" id="1,1"></div>
                <div class="cell" id="1,2"></div>
                <div class="cell" id="2,0"></div>
                <div class="cell" id="2,1"></div>
                <div class="cell" id="2,2"></div>
            </div>
            <div class="choices"></div>
        </div>
    </div>
</body>
</html>
